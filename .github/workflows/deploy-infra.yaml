name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - dev
      - infra
    paths:
      - 'deployment/terraform/**'
  pull_request:
    branches:
      - main
      - dev
    paths:
      - 'deployment/terraform/**'
  workflow_dispatch:

jobs:
  deploy_infra:
    name: Deploy Terraform
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v2'
        with:
          workload_identity_provider: 'projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ secrets.WIF_POOL_ID }}/providers/${{ secrets.WIF_PROVIDER_ID }}'
          service_account: '${{ secrets.GCP_SERVICE_ACCOUNT }}'
          create_credentials_file: true
          project_id: ${{ vars.CICD_PROJECT_ID }}

      - name: Set up Cloud SDK
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform Init
        working-directory: deployment/terraform/cicd
        run: terraform init

      - name: Terraform Plan
        working-directory: deployment/terraform/cicd
        run: terraform plan -var-file=vars/env.tfvars

      - name: Terraform Apply
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        working-directory: deployment/terraform/cicd
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: terraform apply -auto-approve -var-file=vars/env.tfvars
